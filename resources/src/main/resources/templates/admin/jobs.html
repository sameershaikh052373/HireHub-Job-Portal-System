<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(content=~{::content})}">
<head>
    <title>Manage Jobs - Admin Panel</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Manage Jobs</h2>
            <a href="/dashboard" class="btn btn-outline-primary">Back to Dashboard</a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Job Title</th>
                                <th>Company</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Posted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="job : ${jobs}">
                                <td th:text="${job.id}">ID</td>
                                <td>
                                    <a th:href="@{/jobs/{id}(id=${job.id})}" th:text="${job.title}">Job Title</a>
                                </td>
                                <td th:text="${job.employer.companyName ?: job.employer.firstName + ' ' + job.employer.lastName}">Company</td>
                                <td th:text="${job.location}">Location</td>
                                <td>
                                    <span th:switch="${job.status.name()}">
                                        <span th:case="'ACTIVE'" class="badge bg-success">Active</span>
                                        <span th:case="'CLOSED'" class="badge bg-danger">Closed</span>
                                        <span th:case="'DRAFT'" class="badge bg-warning">Draft</span>
                                    </span>
                                </td>
                                <td th:text="${#temporals.format(job.createdAt, 'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div class="btn-group">
                                        <form th:action="@{/admin/jobs/{id}/toggle-status(id=${job.id})}" method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-sm btn-outline-warning">
                                                <span th:text="${job.status.name() == 'ACTIVE' ? 'Close' : 'Activate'}">Toggle</span>
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/jobs/{id}/delete(id=${job.id})}" method="post" style="display: inline;"
                                              onclick="return confirm('Are you sure you want to delete this job?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
