<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(content=~{::content})}">
<head>
    <title>Contact Messages - Admin</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Contact Messages</h2>
            <a th:href="@{/dashboard}" class="btn btn-outline-primary">Back to Dashboard</a>
        </div>
        
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">
                    <i class="fas fa-envelope me-2"></i>All Messages
                    <span class="badge ms-2" style="background-color: var(--danger-color); color: white;" th:if="${unreadCount > 0}" th:text="${unreadCount} + ' unread'">0 unread</span>
                </h5>
            </div>
            <div class="card-body">
                <div th:if="${messages.empty}" class="text-center py-4">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <p class="text-muted">No messages yet.</p>
                </div>
                
                <div th:unless="${messages.empty}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Status</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Subject</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="message : ${messages}">
                                    <td>
                                        <span th:if="${!message.isRead}" class="badge" style="background-color: var(--danger-color); color: white;">Unread</span>
                                        <span th:if="${message.isRead}" class="badge" style="background-color: var(--success-color); color: white;">Read</span>
                                    </td>
                                    <td th:text="${message.name}">Name</td>
                                    <td th:text="${message.email}">Email</td>
                                    <td>
                                        <a th:href="@{/admin/messages/{id}(id=${message.id})}" 
                                           th:text="${message.subject}" 
                                           class="text-decoration-none">Subject</a>
                                    </td>
                                    <td th:text="${#temporals.format(message.createdAt, 'dd MMM yyyy HH:mm')}">Date</td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/admin/messages/{id}(id=${message.id})}" 
                                               class="btn btn-sm btn-outline-primary">View</a>
                                            <form th:action="@{/admin/messages/{id}/delete(id=${message.id})}" 
                                                  method="post" 
                                                  style="display: inline;" 
                                                  onclick="return confirm('Are you sure you want to delete this message?')">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
