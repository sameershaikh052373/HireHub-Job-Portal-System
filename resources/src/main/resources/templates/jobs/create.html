<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(content=~{::content})}">
<head>
    <title>Create Job Listing - Job Portal</title>
</head>
<body>
    <div th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h2 class="mb-4">Create New Job Listing</h2>
                        
                        <!-- Premium Upgrade Alert -->
                        <div th:if="${showUpgrade}" class="alert alert-warning">
                            <h5>Upgrade to Premium!</h5>
                            <p>You've reached your free job posting limit (3 jobs). Upgrade to Premium for unlimited job postings!</p>
                            <a th:href="@{/premium/upgrade}" class="btn btn-warning">Upgrade Now - ₹499/month</a>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <form th:action="@{/employer/jobs/create}" th:object="${job}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Job Title *</label>
                                <input type="text" th:field="*{title}" class="form-control" id="title" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="location" class="form-label">Location *</label>
                                <input type="text" th:field="*{location}" class="form-control" id="location" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="jobType" class="form-label">Job Type *</label>
                                <select th:field="*{jobType}" class="form-select" id="jobType" required>
                                    <option value="">Select Job Type</option>
                                    <option value="FULL_TIME">Full Time</option>
                                    <option value="PART_TIME">Part Time</option>
                                    <option value="CONTRACT">Contract</option>
                                    <option value="INTERNSHIP">Internship</option>
                                    <option value="REMOTE">Remote</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="salary" class="form-label">Salary</label>
                                <input type="text" th:field="*{salary}" class="form-control" id="salary" placeholder="e.g., 5-8 LPA or 10-15 LPA">
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Job Description *</label>
                                <textarea th:field="*{description}" class="form-control" id="description" rows="5" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="requirements" class="form-label">Requirements</label>
                                <textarea th:field="*{requirements}" class="form-control" id="requirements" rows="3"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="benefits" class="form-label">Benefits</label>
                                <textarea th:field="*{benefits}" class="form-control" id="benefits" rows="3"></textarea>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/jobs}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary" th:unless="${showUpgrade}">Create Job</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
