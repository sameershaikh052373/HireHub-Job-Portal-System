<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(content=~{::content})}">
<head>
    <title>Manage Users - Admin Panel</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Manage Users</h2>
            <a href="/dashboard" class="btn btn-outline-primary">Back to Dashboard</a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>User Type</th>
                                <th>Status</th>
                                <th>Registered</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">ID</td>
                                <td th:text="${user.firstName + ' ' + user.lastName}">Name</td>
                                <td th:text="${user.email}">Email</td>
                                <td>
                                    <span th:switch="${user.userType.name()}">
                                        <span th:case="'JOB_SEEKER'" class="badge bg-info">Job Seeker</span>
                                        <span th:case="'EMPLOYER'" class="badge bg-primary">Employer</span>
                                        <span th:case="'ADMIN'" class="badge bg-danger">Admin</span>
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${user.enabled}" class="badge bg-secondary">Disabled</span>
                                </td>
                                <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-warning" 
                                                th:text="${user.enabled ? 'Disable' : 'Enable'}">Toggle</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
