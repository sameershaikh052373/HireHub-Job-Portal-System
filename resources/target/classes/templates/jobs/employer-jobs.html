<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: html(content=~{::content})}">
<head>
    <title>My Job Listings - Job Portal</title>
</head>
<body>
    <div th:fragment="content">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>My Job Listings</h2>
                    <a th:href="@{/employer/jobs/create}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Create New Job
                    </a>
                </div>
                
                <div th:if="${jobs.empty}" class="alert alert-info">
                    <h5>No job listings found</h5>
                    <p>You haven't created any job listings yet. <a th:href="@{/employer/jobs/create}">Create your first job listing</a></p>
                </div>
                
                <div th:if="${!jobs.empty}">
                    <div class="row">
                        <div th:each="job : ${jobs}" class="col-md-6 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title" th:text="${job.title}">Job Title</h5>
                                    <p class="card-text">
                                        <small class="text-muted">
                                            <i class="fas fa-map-marker-alt"></i> <span th:text="${job.location}">Location</span> |
                                            <i class="fas fa-clock"></i> <span th:text="${job.jobType}">Job Type</span> |
                                            <span class="badge" th:classappend="${job.status == T(com.jobportal.models.Job.JobStatus).ACTIVE} ? 'bg-success' : 'bg-secondary'" 
                                                  th:text="${job.status}">Status</span>
                                        </small>
                                    </p>
                                    <p class="card-text" th:text="${#strings.abbreviate(job.description, 100)}">Job description...</p>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline-primary btn-sm">View</a>
                                        <form th:action="@{/employer/jobs/{id}/close(id=${job.id})}" method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-outline-warning btn-sm" 
                                                    th:if="${job.status == T(com.jobportal.models.Job.JobStatus).ACTIVE}">Close</button>
                                        </form>
                                        <form th:action="@{/employer/jobs/{id}/delete(id=${job.id})}" method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" 
                                                    onclick="return confirm('Are you sure you want to delete this job?')">Delete</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
